            </div>
        </div>

    <p id="certifications-text" class="left-1/2 -translate-x-1/2 text-[50px] absolute top-[120px] [text-shadow:_1px_2px_20px_rgba(0,0,0,0.8)]">
        CERTIFICATIONS</p>
    <div id="certifications-container" class="mt-[-100px]">

        <div id="certifications-card" class="java-certif"><img class="image-certifications" src="images/java_cert.png"
                onclick="openModal(this.src)"><a
                href="https://www.certiport.com/portal/pages/credentialverification.aspx" target="_blank">
                <h1
                    class="border-[1px] text-center mt-[20px]  bg-[rgb(17,17,18)] p-2 hover:bg-[rgba(187,193,199,0.46)]">
                    VERIFY</h1>
            </a></div>
        <div id="certifications-card" class="word-certif"><img class="image-certifications" src="images/word_cert.png"
                onclick="openModal(this.src)"><a
                href="https://www.certiport.com/portal/pages/credentialverification.aspx" target="_blank">

                    class="border-[1px] text-center mt-[20px]  bg-[rgb(17,17,18)] p-2 hover:bg-[rgba(187,193,199,0.46)]">
                    VERIFY</h1>
            </a></div>
        <div id="certifications-card" class="excel-certif"><img class="image-certifications" src="images/excel_cert.png"
                onclick="openModal(this.src)"><a
                href="https://www.certiport.com/portal/pages/credentialverification.aspx" target="_blank">

                    class="border-[1px] text-center mt-[20px]  bg-[rgb(17,17,18)] p-2 hover:bg-[rgba(187,193,199,0.46)]">

            </a></div>
